services:
  shop-postgres:
    image: postgres:18.1-bookworm
    container_name: shop-env-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    restart: always
  shop-redis:
    image: redis:8.6.1
    container_name: chop-env-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ${PROJECT_ROOT}/out/redis_data:/data
    restart: always
  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: shop-env-ports-forwarder
    entrypoint: |
      /bin/sh -c "
        socat -d -d tcp-listen:5432,fork,reuseaddr tcp-connect:shop-postgres:5432 &
        socat -d -d tcp-listen:6379,fork,reuseaddr tcp-connect:shop-redis:6379 &
        wait
      "
    depends_on:
      - shop-postgres
      - shop-redis
    ports:
      - "127.0.0.1:5432:5432"
      - "127.0.0.1:6379:6379"
  shop-migrate:
    image: migrate/migrate:v4.19.1
    depends_on:
      - shop-postgres
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations
  swagger:
    build:
      context:  ${PROJECT_ROOT}
      dockerfile: ${PROJECT_ROOT}/swagger/Dockerfile
    volumes:
      - ${PROJECT_ROOT}:/code