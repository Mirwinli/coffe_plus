host: 127.0.0.1:5050
info:
  contact: {}
  description: Cafe-Shop Application API scheme
  title: Golang Cafe-Shop API
  version: "1.0"
paths:
  /admin/order:
    get:
      description: |-
        Виведеняня замовленнь за їх статусом
        Admin only
      parameters:
      - description: Order status filter
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Замовлення
          schema:
            $ref: '#/definitions/internal_feature_order_adapters_in.AdminListOrdersResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_Mirwinli_coffe_plus_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Mirwinli_coffe_plus_internal_core_transport_http_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Виведенення замовлень
      tags:
      - order
  /admin/users:
    get:
      description: |-
        Вивести всіх користувачів
        Only for admins
      parameters:
      - description: limit
        in: query
        name: limit
        type: integer
      - description: offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Користувачі
          schema:
            items:
              $ref: '#/definitions/internal_feature_auth_adapters_in_transport_http.UserDTOResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_Mirwinli_coffe_plus_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Mirwinli_coffe_plus_internal_core_transport_http_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Всі користувачі
      tags:
      - users
  /admin/users/{id}:
    get:
      description: |-
        Отримати користувача за його ID
        Only for admins
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Користувач
          schema:
            $ref: '#/definitions/internal_feature_auth_adapters_in_transport_http.GetUserResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_Mirwinli_coffe_plus_internal_core_transport_http_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_Mirwinli_coffe_plus_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: Not found
          schema:
            $ref: '#/definitions/github_com_Mirwinli_coffe_plus_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Mirwinli_coffe_plus_internal_core_transport_http_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Отримати користувача
      tags:
      - users
  /auth/login:
    post:
      consumes:
      - application/json
      description: Вхід вже зареєстрованого користувача в систему
      parameters:
      - description: Login тіло запиту
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_feature_auth_adapters_in_transport_http.AuthLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Користувач
          headers:
            Set-Cookie:
              description: refresh_token=...; Path=/; SameSite=Strict; Max-Age=2592000;
                HttpOnly; Secure
              type: string
          schema:
            $ref: '#/definitions/internal_feature_auth_adapters_in_transport_http.AuthLoginResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_Mirwinli_coffe_plus_internal_core_transport_http_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_Mirwinli_coffe_plus_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: Not found
          schema:
            $ref: '#/definitions/github_com_Mirwinli_coffe_plus_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Mirwinli_coffe_plus_internal_core_transport_http_response.ErrorResponse'
      summary: Вхід
      tags:
      - auth
  /auth/logout:
    delete:
      description: Видалення refresh токену та скасування access токену у зареєстрованого
        користувача
      parameters:
      - description: refresh_token=your_token_here
        in: header
        name: Cookie
        required: true
        type: string
      responses:
        "204":
          description: Успішний вихід
        "401":
          description: Unauthorized
        "500":
          description: Internal server error
      summary: Вихід
      tags:
      - auth
  /auth/refresh:
    post:
      description: Видалення та зміна refresh токен та створення нового access токен
      parameters:
      - description: refresh_token=your_token_here
        in: header
        name: Cookie
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Success" {header:string:Set-Cookie:"Session cookie"}
          schema:
            $ref: '#/definitions/internal_feature_auth_adapters_in_transport_http.AuthLoginResponse'
        "401":
          description: Invalid token
          schema:
            $ref: '#/definitions/github_com_Mirwinli_coffe_plus_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Mirwinli_coffe_plus_internal_core_transport_http_response.ErrorResponse'
      summary: Зміна access та refresh токенів
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Створення нового користувача в системі
      parameters:
      - description: Register тіло запиту
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_feature_auth_adapters_in_transport_http.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Користувач
          schema:
            $ref: '#/definitions/internal_feature_auth_adapters_in_transport_http.RegisterResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_Mirwinli_coffe_plus_internal_core_transport_http_response.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_Mirwinli_coffe_plus_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Mirwinli_coffe_plus_internal_core_transport_http_response.ErrorResponse'
      summary: Реєстрація
      tags:
      - auth
  /auth/user:
    patch:
      consumes:
      - application/json
      description: |-
        Зміна данних користувача
        Номеру телефону,Прізвище або Імя,Пароль
        Правила зміни полів:
        1. **Поле не передано**: `description` ігноруєтся, значення в БД не змінюєтся
        2. **Явно передано значення**: `description`: "Вийти погуляти в 6:30 з собакою" - змінюєьтся поле в БД
        Обмеження: Ніякі поля не можуть бути null
      parameters:
      - description: PatchUser тіло запиту
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_feature_auth_adapters_in_transport_http.PatchUserSwaggerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Змінений користувач
          schema:
            $ref: '#/definitions/internal_feature_auth_adapters_in_transport_http.PatchUserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_Mirwinli_coffe_plus_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_Mirwinli_coffe_plus_internal_core_transport_http_response.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_Mirwinli_coffe_plus_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Mirwinli_coffe_plus_internal_core_transport_http_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Зміна користувача
      tags:
      - auth
  /cart:
    delete:
      description: Видалення кошика та його вміст
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
